name: 매일 주식 분석

on:
  # 정기 실행 - 매일 한국시간 19:00 / 베이징시간 18:00 (UTC 10:00)
  schedule:
    - cron: '0 10 * * 1-5'     # 周一到周五，UTC 10:00 = 北京时间 18:00
  
  # 수동 실행
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드'
        required: true
        default: 'full'
        type: choice
        options:
          - full          # 전체 분석(종목 + 시장)
          - market-only   # 시장 복기만 실행
          - stocks-only   # 종목 분석만 실행
      force_run:
        description: '강제 실행(거래일 검사 건너뛰기)'
        required: false
        default: false
        type: boolean

# 동시 실행 제어: 한 번에 하나의 분석만 실행
concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    # 작업이 멈추는 경우를 막기 위한 타임아웃
    timeout-minutes: 30
    
    steps:
      - name: 무작위 지연(고정 시각 접근 완화)
        run: sleep $((RANDOM % 60))  # 0-60초 무작위 지연
      
      - name: 코드 체크아웃
        uses: actions/checkout@v5
      
      - name: Python 환경 설정
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 의존성 설치
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 필수 디렉터리 생성
        run: |
          mkdir -p data logs reports
      
      - name: 주식 분석 실행
        env:
          # ==========================================
          # AI 설정
          # ==========================================
          # LITELLM_CONFIG
          LITELLM_CONFIG: ${{ vars.LITELLM_CONFIG || secrets.LITELLM_CONFIG }}
          LITELLM_CONFIG_YAML: ${{ vars.LITELLM_CONFIG_YAML || secrets.LITELLM_CONFIG_YAML }}
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_MODEL: ${{ vars.LITELLM_MODEL || secrets.LITELLM_MODEL }}

          # Gemini AI(기본)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || secrets.GEMINI_MODEL || 'gemini-3-flash-preview' }}
          GEMINI_MODEL_FALLBACK: ${{ vars.GEMINI_MODEL_FALLBACK || secrets.GEMINI_MODEL_FALLBACK || 'gemini-2.5-flash' }}
          GEMINI_REQUEST_DELAY: '3.0'
          
          # AIHubMix(OPENAI_API_KEY보다 우선, base_url 자동 적용)
          AIHUBMIX_KEY: ${{ secrets.AIHUBMIX_KEY }}

          # OpenAI 호환 API(보조)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || secrets.OPENAI_MODEL }}

          # Anthropic / Claude
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || secrets.ANTHROPIC_MODEL || 'claude-3-5-sonnet-20241022' }}

          # ==========================================
          # 데이터 소스
          # ==========================================
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          
          # ==========================================
          # 검색 서비스
          # ==========================================
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          SERPAPI_API_KEYS: ${{ secrets.SERPAPI_API_KEYS }}
          MINIMAX_API_KEYS: ${{ secrets.MINIMAX_API_KEYS }}
          BRAVE_API_KEYS: ${{ secrets.BRAVE_API_KEYS }}
          SEARXNG_BASE_URLS: ${{ secrets.SEARXNG_BASE_URLS }}
          SEARXNG_PUBLIC_INSTANCES_ENABLED: ${{ vars.SEARXNG_PUBLIC_INSTANCES_ENABLED || secrets.SEARXNG_PUBLIC_INSTANCES_ENABLED }}
          
          # ==========================================
          # 알림 채널(여러 개 동시 사용 가능)
          # ==========================================
          
          # 1. 기업용 WeChat Webhook
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          WECHAT_MSG_TYPE: ${{ vars.WECHAT_MSG_TYPE || secrets.WECHAT_MSG_TYPE || 'markdown' }}
          
          # 2. Feishu Webhook
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          
          # 3. Telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}
          
          # 4. 이메일
          EMAIL_SENDER: ${{ vars.EMAIL_SENDER || secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ vars.EMAIL_RECEIVERS || secrets.EMAIL_RECEIVERS }}
          EMAIL_SENDER_NAME: ${{ vars.EMAIL_SENDER_NAME || secrets.EMAIL_SENDER_NAME || 'daily_stock_analysis 분석 도우미' }}
          
          # 5. Pushover
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
          
          # 6. PushPlus
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          
          # 7. 사용자 지정 Webhook
          CUSTOM_WEBHOOK_URLS: ${{ secrets.CUSTOM_WEBHOOK_URLS }}
          CUSTOM_WEBHOOK_BEARER_TOKEN: ${{ secrets.CUSTOM_WEBHOOK_BEARER_TOKEN }}
          
          # 8. Discord
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_MAIN_CHANNEL_ID: ${{ secrets.DISCORD_MAIN_CHANNEL_ID }}
          
          # 9. Feishu 문서
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_FOLDER_TOKEN: ${{ secrets.FEISHU_FOLDER_TOKEN }}

          # 10. AstrBot
          ASTRBOT_URL: ${{ secrets.ASTRBOT_URL }}
          ASTRBOT_TOKEN: ${{ secrets.ASTRBOT_TOKEN }}

          # 11. ServerChan3
          SERVERCHAN3_SENDKEY: ${{ secrets.SERVERCHAN3_SENDKEY }}

          # 12. Slack
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}

          # ==========================================
          # 관심 종목 설정
          # ==========================================
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST || 'AAPL,MSFT,NVDA,AMZN,TSLA' }}
          MARKET_REVIEW_REGION: ${{ vars.MARKET_REVIEW_REGION || secrets.MARKET_REVIEW_REGION || 'us' }}
          REPORT_LANGUAGE: ${{ vars.REPORT_LANGUAGE || secrets.REPORT_LANGUAGE || 'en' }}
          
          # ==========================================
          # 실행 설정
          # ==========================================
          REPORT_TYPE: ${{ vars.REPORT_TYPE || secrets.REPORT_TYPE || 'simple' }}
          SINGLE_STOCK_NOTIFY: ${{ vars.SINGLE_STOCK_NOTIFY || secrets.SINGLE_STOCK_NOTIFY || 'false' }}
          MARKET_REVIEW_ENABLED: ${{ vars.MARKET_REVIEW_ENABLED || secrets.MARKET_REVIEW_ENABLED || 'true' }}
          ANALYSIS_DELAY: ${{ vars.ANALYSIS_DELAY || secrets.ANALYSIS_DELAY || '0' }}
          TRADING_DAY_CHECK_ENABLED: ${{ vars.TRADING_DAY_CHECK_ENABLED || secrets.TRADING_DAY_CHECK_ENABLED || 'true' }}
          J2W_MARKET_ANALYSIS_ENDPOINT: ${{ secrets.J2W_MARKET_ANALYSIS_ENDPOINT }}
          J2W_MARKET_ANALYSIS_TOKEN: ${{ secrets.MARKET_ANALYSIS_INGEST_TOKEN }}
          J2W_MARKET_ANALYSIS_SOURCE_URL: ${{ vars.J2W_MARKET_ANALYSIS_SOURCE_URL || secrets.J2W_MARKET_ANALYSIS_SOURCE_URL }}
          
          # ==========================================
          # 시스템 설정
          # ==========================================
          LOG_LEVEL: INFO
          MAX_WORKERS: ${{ vars.MAX_WORKERS || secrets.MAX_WORKERS || '1' }}
          # 차트/분포 옵션: 기본 false
          ENABLE_CHIP_DISTRIBUTION: ${{ vars.ENABLE_CHIP_DISTRIBUTION || secrets.ENABLE_CHIP_DISTRIBUTION || 'false' }}
          # 실시간 시세 소스 우선순위
          # 선택값: tencent, akshare_sina, efinance, akshare_em, tushare
          REALTIME_SOURCE_PRIORITY: ${{ vars.REALTIME_SOURCE_PRIORITY || 'tencent,akshare_sina,efinance,akshare_em' }}
          
        run: |
          # LITELLM YAML 설정 처리
          if [ -n "$LITELLM_CONFIG_YAML" ] && [ -n "$LITELLM_CONFIG" ]; then
            echo "📝 GitHub Actions Secrets/Variables의 LITELLM_CONFIG_YAML을 사용합니다."
            # 디렉터리 보장
            mkdir -p "$(dirname "$LITELLM_CONFIG")"
            # 설정 파일 기록(기존 파일 덮어쓰기)
            echo "$LITELLM_CONFIG_YAML" > "$LITELLM_CONFIG"
            echo "✅ LITELLM 설정 파일 기록 완료: $LITELLM_CONFIG"
          fi

          # 실행 모드 결정
          MODE="${{ github.event.inputs.mode || 'full' }}"
          
          echo "=========================================="
          echo "🚀 일일 주식 분석 시스템"
          echo "=========================================="
          echo "⏰ 시간: $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M:%S')"
          echo "🎯 실행 모드: $MODE"
          echo "📊 관심 종목: $STOCK_LIST"
          echo "📝 리포트 타입: $REPORT_TYPE"
          echo ""
          echo "=========================================="
          echo "📋 설정 확인"
          echo "=========================================="
          echo "【AI 설정】"
          echo "  LiteLLM: $([ -n "$LITELLM_CONFIG" ] || [ -n "$LITELLM_API_KEY" ] || [ -n "$LITELLM_MODEL" ] && echo '✅ 설정됨' || echo '❌ 미설정')"
          echo "  Gemini API Key: $([ -n "$GEMINI_API_KEY" ] && echo '✅ 설정됨' || echo '❌ 미설정')"
          echo "  AIHubMix Key:   $([ -n "$AIHUBMIX_KEY" ] && echo '✅ 설정됨' || echo '⚪ 미설정')"
          echo "  OpenAI API Key: $([ -n "$OPENAI_API_KEY" ] && echo '✅ 설정됨' || echo '⚪ 미설정')"
          echo "  Anthropic Key:  $([ -n "$ANTHROPIC_API_KEY" ] && echo '✅ 설정됨' || echo '⚪ 미설정')"
          echo ""
          echo "【검색 엔진】"
          echo "  Bocha API Keys: $([ -n "$BOCHA_API_KEYS" ] && echo '✅ 설정됨' || echo '⚪ 미설정')"
          echo "  Tavily API Keys: $([ -n "$TAVILY_API_KEYS" ] && echo '✅ 설정됨' || echo '⚪ 미설정')"
          echo "  SerpAPI Keys: $([ -n "$SERPAPI_API_KEYS" ] && echo '✅ 설정됨' || echo '⚪ 미설정')"
          echo "  MiniMax API Keys: $([ -n "$MINIMAX_API_KEYS" ] && echo '✅ 설정됨' || echo '⚪ 미설정')"
          echo "  Brave API Keys: $([ -n "$BRAVE_API_KEYS" ] && echo '✅ 설정됨' || echo '⚪ 미설정')"
          echo "  SearXNG Base URLs: $([ -n "$SEARXNG_BASE_URLS" ] && echo '✅ 설정됨' || echo '⚪ 미설정')"
          case "${SEARXNG_PUBLIC_INSTANCES_ENABLED,,}" in
            0|false|no|off)
              echo "  SearXNG Public Instances: ❌ 비활성화"
              ;;
            "")
              echo "  SearXNG Public Instances: ✅ 기본 활성화"
              ;;
            *)
              echo "  SearXNG Public Instances: ✅ 활성화"
              ;;
          esac
          echo ""
          echo "【알림 채널】"
          echo "  PushPlus: $([ -n "$PUSHPLUS_TOKEN" ] && echo '✅ 설정됨' || echo '⚪ 미설정')"
          echo "  J2W 업로드: $(([ -n "$J2W_MARKET_ANALYSIS_ENDPOINT" ] && [ -n "$J2W_MARKET_ANALYSIS_TOKEN" ]) && echo '✅ 설정됨' || echo '⚪ 미설정')"
          echo "  기업용 WeChat: $([ -n "$WECHAT_WEBHOOK_URL" ] && echo '✅ 설정됨' || echo '⚪ 미설정')"
          echo "  Feishu: $([ -n "$FEISHU_WEBHOOK_URL" ] && echo '✅ 설정됨' || echo '⚪ 미설정')"
          echo "  Telegram: $([ -n "$TELEGRAM_BOT_TOKEN" ] && echo '✅ 설정됨' || echo '⚪ 미설정')"
          echo "  Discord: $([ -n "$DISCORD_WEBHOOK_URL" ] && echo '✅ 설정됨' || echo '⚪ 미설정')"
          echo "  AstrBot: $([ -n "$ASTRBOT_URL" ] && echo '✅ 설정됨' || echo '⚪ 미설정')"
          echo "  Slack: $(([ -n "$SLACK_WEBHOOK_URL" ] || ([ -n "$SLACK_BOT_TOKEN" ] && [ -n "$SLACK_CHANNEL_ID" ])) && echo '✅ 설정됨' || echo '⚪ 미설정')"
          echo "=========================================="
          echo ""
          
          # 명령행 인자 구성
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
            echo "⚡ 강제 실행 모드 사용 중(거래일 검사 건너뜀)"
          fi

          # 분석 실행
          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review $FORCE_RUN_ARG
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py --no-market-review $FORCE_RUN_ARG
          else
            python main.py $FORCE_RUN_ARG
          fi
      
      - name: 분석 결과 업로드
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: analysis-reports-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30
      
      - name: 실행 결과 표시
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "📊 분석 완료"
          echo "=========================================="
          if [ -d "reports" ] && [ "$(ls -A reports 2>/dev/null)" ]; then
            echo "생성된 리포트:"
            ls -la reports/
          else
            echo "⚠️ 생성된 리포트 파일이 없습니다."
          fi
          echo ""
          if [ -f "logs/stock_analysis_$(date +%Y%m%d).log" ]; then
            echo "📜 최근 로그(마지막 30줄):"
            tail -30 logs/stock_analysis_*.log 2>/dev/null || echo "로그 없음"
          fi
